name: Build Baseline APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    # 1. 锁死兼容历史代差的 JDK 11
    - name: set up JDK 11
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'

    # 2. 【终极对齐】开辟纯净沙箱，并强行物理复制系统预设的合法签署许可证
    - name: Isolate Android SDK & Sync Accepted Licenses
      run: |
        mkdir -p ${{ github.workspace }}/clean-sdk
        
        # 核心绝杀：如果系统预设的执照目录存在，物理克隆到沙箱中，瞬间合法化环境
        if [ -d "/usr/local/lib/android/sdk/licenses" ]; then
          cp -r /usr/local/lib/android/sdk/licenses ${{ github.workspace }}/clean-sdk/
        fi
        
        # 死锁沙箱路径指针
        echo "sdk.dir=${{ github.workspace }}/clean-sdk" > local.properties
        echo "ANDROID_HOME=${{ github.workspace }}/clean-sdk" >> $GITHUB_ENV

    # 3. 自动赋予原作者的编译脚本最高执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. 在绝对合规、纯净的沙箱世界中执行打包任务
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 5. 模糊匹配全量抓取生成的 APK
    - name: Upload APK
      uses: actions/upload-artifact@v5
      with:
        name: TeslaMirror-Baseline
        path: "**/build/outputs/apk/debug/*.apk"
